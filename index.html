        + '<div class="modal-footer">'
        + (isNew ? '' : '<button class="btn-delete" id="ev-delete">Delete event</button>')
        + '<button class="btn-close" id="ev-close">Done</button>'
        + '</div>'
        + '</div></div>';

      document.getElementById('modal-root').innerHTML = html;
      wireEventModal();
      if(isNew) document.getElementById('ev-title').focus();
    }

    function wireEventModal(){
      function closeDom(){ document.getElementById('modal-root').innerHTML = ''; }

      document.getElementById('scrim').addEventListener('click', function(e){ if(e.target.id==='scrim') closeDom(); });
      document.getElementById('ev-title').addEventListener('input', function(e){ draft.title = e.target.value; });
      document.getElementById('ev-location').addEventListener('input', function(e){ draft.location = e.target.value; });
      document.getElementById('ev-notes').addEventListener('input', function(e){ draft.notes = e.target.value; });
      document.getElementById('ev-date').addEventListener('change', function(e){ draft.date = e.target.value; });
      document.getElementById('ev-end-date').addEventListener('change', function(e){ draft.endDate = e.target.value || null; });
      document.getElementById('ev-time').addEventListener('change', function(e){ draft.time = e.target.value || null; });

      document.getElementById('ev-allday').addEventListener('change', function(e){
        draft.allDay = e.target.checked;
        if(draft.allDay) draft.time = null;
        renderEventModal();
      });

      document.querySelectorAll('.cat-btn').forEach(function(btn){
        btn.addEventListener('click', function(){ draft.category = btn.dataset.cat; renderEventModal(); });
      });

      document.querySelectorAll('.attendee-chip').forEach(function(chip){
        chip.addEventListener('click', function(){
          var id = chip.dataset.id;
          if(id === 'all'){ draft.attendees = ['all']; }
          else{
            draft.attendees = draft.attendees.filter(function(a){ return a!=='all'; });
            var i = draft.attendees.indexOf(id);
            if(i===-1) draft.attendees.push(id); else draft.attendees.splice(i,1);
            if(!draft.attendees.length) draft.attendees = ['all'];
          }
          renderEventModal();
        });
      });

      document.getElementById('ev-repeat-freq').addEventListener('change', function(e){
        var freq = e.target.value;
        if(!freq){ draft.recurrence = null; }
        else{
          draft.recurrence = { freq: freq, interval:1, byWeekday: freq==='weekly' ? [new Date(draft.date+'T00:00:00').getDay()] : null, until:null, count:null };
        }
        renderEventModal();
      });

      var intervalEl = document.getElementById('ev-interval');
      if(intervalEl) intervalEl.addEventListener('input', function(e){ draft.recurrence.interval = Math.max(1, parseInt(e.target.value,10)||1); });

      document.querySelectorAll('#ev-weekdays button').forEach(function(btn){
        btn.addEventListener('click', function(){
          var dow = parseInt(btn.dataset.dow,10);
          var list = draft.recurrence.byWeekday || [];
          var i = list.indexOf(dow);
          if(i===-1) list.push(dow); else if(list.length>1) list.splice(i,1);
          draft.recurrence.byWeekday = list;
          renderEventModal();
        });
      });

      document.querySelectorAll('input[name="ev-ends"]').forEach(function(radio){
        radio.addEventListener('change', function(){
          if(radio.value==='never'){ draft.recurrence.until=null; draft.recurrence.count=null; }
          else if(radio.value==='until'){ draft.recurrence.until = draft.recurrence.until || dateAdd(draft.date, 30); draft.recurrence.count=null; }
          else if(radio.value==='count'){ draft.recurrence.count = draft.recurrence.count || 5; draft.recurrence.until=null; }
          renderEventModal();
        });
      });
      var untilEl = document.getElementById('ev-until');
      if(untilEl) untilEl.addEventListener('change', function(e){ draft.recurrence.until = e.target.value || null; });
      var countEl = document.getElementById('ev-count');
      if(countEl) countEl.addEventListener('input', function(e){ draft.recurrence.count = Math.max(1, parseInt(e.target.value,10)||1); });

      function buildFields(){
        return {
          title: (draft.title||'').trim() || 'Untitled event',
          category: draft.category, attendees: draft.attendees.slice(),
          date: draft.date, endDate: draft.endDate || null,
          allDay: draft.allDay, time: draft.allDay ? null : draft.time,
          location: draft.location||'', notes: draft.notes||'',
          recurrence: draft.recurrence ? Object.assign({}, draft.recurrence) : null
        };
      }

      function commit(scope){
        var fields = buildFields();
        if(isNew){
          if(!draft.title || !draft.title.trim()){ closeDom(); render(); return; }
          state.events.push(Object.assign({}, sourceEvent, fields, { exceptionDates:[], recurrenceId:null, overrideDate:null }));
        } else if(occ.isOverride || !occ.isVirtual){
          Object.assign(findEventById(occ.occurrenceId), fields);
        } else {
          applyEditScope(occ, scope, fields);
        }
        persistCalendar();
        closeDom();
        render();
      }

      document.getElementById('ev-close').addEventListener('click', function(){
        if(needsScope){ promptScope('Apply changes to…', function(scope){ commit(scope); }); }
        else{ commit(null); }
      });

      var delBtn = document.getElementById('ev-delete');
      if(delBtn){
        delBtn.addEventListener('click', function(){
          closeDom();
          if(occ.isOverride || !occ.isVirtual){
            state.events = state.events.filter(function(e){ return e.id !== occ.occurrenceId; });
            persistCalendar(); render();
          } else {
            promptScope('Delete…', function(scope){
              deleteOccurrence(occ, scope);
              persistCalendar(); render();
            });
          }
        });
      }
    }

    renderEventModal();
  }

  /* ================= SETTINGS MODAL ================= */
  function openSettingsModal(){
    var cfg = getConfig() || {owner:'',repo:'',path:'tasks.json',calendarPath:'family-calendar.json',branch:'main',token:''};
    var html = ''
      + '<div class="scrim" id="scrim">'
      + '<div class="modal">'
      + '<div class="field-label" style="margin-top:0;">GitHub Sync Settings</div>'
      + '<div class="settings-field"><label>Repo owner</label><input class="text-input" id="s-owner" value="'+escapeHtml(cfg.owner)+'" placeholder="e.g. your-github-username"></div>'
      + '<div class="settings-field"><label>Repo name</label><input class="text-input" id="s-repo" value="'+escapeHtml(cfg.repo)+'" placeholder="e.g. task-manager"></div>'
      + '<div class="settings-field"><label>Branch</label><input class="text-input" id="s-branch" value="'+escapeHtml(cfg.branch||'main')+'"></div>'
      + '<div class="row-2">'
      + '<div class="settings-field"><label>Tasks file path</label><input class="text-input" id="s-path" value="'+escapeHtml(cfg.path||'tasks.json')+'"></div>'
      + '<div class="settings-field"><label>Calendar file path</label><input class="text-input" id="s-cal-path" value="'+escapeHtml(cfg.calendarPath||'family-calendar.json')+'"></div>'
      + '</div>'
      + '<div class="settings-field"><label>Personal access token</label><input class="text-input" type="password" id="s-token" value="'+escapeHtml(cfg.token)+'" placeholder="fine-grained PAT, Contents: read & write"></div>'
      + '<div class="settings-help">Create a fine-grained token at github.com → Settings → Developer settings → Personal access tokens, scoped to just this repo with <strong>Contents: Read and write</strong> permission. It is stored only in this browser, never committed to the repo. Everyone in the family needs to enter their own token here on their own device.</div>'
      + '<div class="settings-actions">'
      + '<button class="btn-primary" id="s-save">Save & Connect</button>'
      + '<button class="btn-sm" id="s-disconnect">Disconnect</button>'
      + '<button class="btn-sm" id="s-cancel">Cancel</button>'
      + '</div>'
      + '<div id="s-error" style="color:var(--overdue);font-size:12px;margin-top:10px;"></div>'
      + '</div></div>';
    document.getElementById('modal-root').innerHTML = html;

    function close(){ document.getElementById('modal-root').innerHTML = ''; }
    document.getElementById('scrim').addEventListener('click', function(e){ if(e.target.id==='scrim') close(); });
    document.getElementById('s-cancel').addEventListener('click', close);
    document.getElementById('s-disconnect').addEventListener('click', function(){
      clearConfig();
      close();
      showSetupBanner(true);
      updateSyncStatus('local');
    });
    document.getElementById('s-save').addEventListener('click', function(){
      var newCfg = {
        owner: document.getElementById('s-owner').value.trim(),
        repo: document.getElementById('s-repo').value.trim(),
        branch: document.getElementById('s-branch').value.trim() || 'main',
        path: document.getElementById('s-path').value.trim() || 'tasks.json',
        calendarPath: document.getElementById('s-cal-path').value.trim() || 'family-calendar.json',
        token: document.getElementById('s-token').value.trim()
      };
      if(!newCfg.owner || !newCfg.repo || !newCfg.token){
        document.getElementById('s-error').textContent = 'Owner, repo, and token are required.';
        return;
      }
      setConfig(newCfg);
      close();
      loadFromGitHub();
      loadCalendarFromGitHub();
    });
  }

  /* ================= FAMILY SETTINGS MODAL ================= */
  function openFamilySettingsModal(){
    var draft = state.family.map(function(m){ return Object.assign({}, m); });

    function nextColor(){
      var used = draft.map(function(m){ return m.color; });
      for(var i=0;i<FAMILY_COLOR_PALETTE.length;i++){
        if(used.indexOf(FAMILY_COLOR_PALETTE[i]) === -1) return FAMILY_COLOR_PALETTE[i];
      }
      return FAMILY_COLOR_PALETTE[draft.length % FAMILY_COLOR_PALETTE.length];
    }

    var html = ''
      + '<div class="scrim" id="scrim">'
      + '<div class="modal">'
      + '<div class="field-label" style="margin-top:0;">Family Members</div>'
      + '<div id="family-list"></div>'
      + '<button class="btn-sm" id="fam-add">+ Add family member</button>'
      + '<div class="settings-help">Each person\'s email should match what they log into Cloudflare Access with, so the app knows who\'s using it (for defaults and a simplified kid view). Leave email blank for a family member who won\'t log in themselves — they\'ll still show up as a taggable attendee.</div>'
      + '<div class="settings-actions">'
      + '<button class="btn-primary" id="fam-save">Save</button>'
      + '<button class="btn-sm" id="fam-cancel">Cancel</button>'
      + '</div>'
      + '<div id="fam-error" style="color:var(--overdue);font-size:12px;margin-top:10px;"></div>'
      + '</div></div>';
    document.getElementById('modal-root').innerHTML = html;

    function renderFamilyList(){
      var rows = draft.map(function(m, i){
        return '<div class="family-row" data-idx="'+i+'">'
          + '<button type="button" class="color-swatch" data-idx="'+i+'" style="background:'+m.color+'" title="Click to change color"></button>'
          + '<input class="text-input fam-name" data-idx="'+i+'" placeholder="Name" value="'+escapeHtml(m.name||'')+'">'
          + '<input class="text-input fam-email" data-idx="'+i+'" placeholder="email@example.com" value="'+escapeHtml(m.email||'')+'">'
          + '<div class="seg3 fam-role" data-idx="'+i+'">'
          + '<button type="button" data-role="adult" class="'+(m.role!=='kid'?'active':'')+'">Adult</button>'
          + '<button type="button" data-role="kid" class="'+(m.role==='kid'?'active':'')+'">Kid</button>'
          + '</div>'
          + '<button type="button" class="rm fam-remove" data-idx="'+i+'" title="Remove">✕</button>'
          + '</div>';
      }).join('');
      document.getElementById('family-list').innerHTML = rows || '<div class="list-empty">No family members yet — add one below.</div>';

      document.querySelectorAll('.color-swatch').forEach(function(btn){
        btn.addEventListener('click', function(){
          var i = parseInt(btn.dataset.idx,10);
          var idx = FAMILY_COLOR_PALETTE.indexOf(draft[i].color);
          draft[i].color = FAMILY_COLOR_PALETTE[(idx+1+FAMILY_COLOR_PALETTE.length) % FAMILY_COLOR_PALETTE.length];
          renderFamilyList();
        });
      });
      document.querySelectorAll('.fam-name').forEach(function(inp){
        inp.addEventListener('input', function(){ draft[parseInt(inp.dataset.idx,10)].name = inp.value; });
      });
      document.querySelectorAll('.fam-email').forEach(function(inp){
        inp.addEventListener('input', function(){ draft[parseInt(inp.dataset.idx,10)].email = inp.value.trim().toLowerCase(); });
      });
      document.querySelectorAll('.fam-role button').forEach(function(btn){
        btn.addEventListener('click', function(){
          var i = parseInt(btn.closest('.fam-role').dataset.idx,10);
          draft[i].role = btn.dataset.role;
          renderFamilyList();
        });
      });
      document.querySelectorAll('.fam-remove').forEach(function(btn){
        btn.addEventListener('click', function(){
          draft.splice(parseInt(btn.dataset.idx,10),1);
          renderFamilyList();
        });
      });
    }
    renderFamilyList();

    function close(){ document.getElementById('modal-root').innerHTML = ''; }
    document.getElementById('scrim').addEventListener('click', function(e){ if(e.target.id==='scrim') close(); });
    document.getElementById('fam-cancel').addEventListener('click', close);
    document.getElementById('fam-add').addEventListener('click', function(){
      draft.push({ id: uid(), name:'', color: nextColor(), email:'', role:'adult' });
      renderFamilyList();
    });
    document.getElementById('fam-save').addEventListener('click', function(){
      var cleaned = draft.filter(function(m){ return m.name && m.name.trim(); })
        .map(function(m){ return { id:m.id, name:m.name.trim(), color:m.color, email:(m.email||'').trim().toLowerCase(), role: m.role==='kid'?'kid':'adult' }; });
      state.family = cleaned;
      resolveCurrentFamilyMember();
      persistCalendar();
      close();
      render();
    });
  }

  /* ================= EVENT WIRING (static header controls) ================= */
  document.getElementById('view-switcher').addEventListener('click', function(e){
    var btn = e.target.closest('button[data-view]');
    if(!btn) return;
    state.view = btn.dataset.view;
    document.querySelectorAll('#view-switcher button').forEach(function(b){ b.classList.toggle('active', b===btn); });
    render();
  });
  document.getElementById('person-tabs').addEventListener('click', function(e){
    var btn = e.target.closest('button[data-person]');
    if(!btn) return;
    state.person = btn.dataset.person;
    document.querySelectorAll('#person-tabs button').forEach(function(b){ b.classList.toggle('active', b===btn); });
    render();
  });
  document.getElementById('search-input').addEventListener('input', function(e){
    state.search = e.target.value;
    render();
  });
  document.getElementById('quick-add-btn').addEventListener('click', function(){
    var input = document.getElementById('quick-add-input');
    quickAddTask(input.value);
    input.value = '';
  });
  document.getElementById('quick-add-input').addEventListener('keydown', function(e){
    if(e.key === 'Enter'){
      quickAddTask(e.target.value);
      e.target.value = '';
    }
  });
  document.getElementById('open-settings').addEventListener('click', openSettingsModal);
  document.getElementById('add-task-full-btn').addEventListener('click', openAddTaskModal);
  document.getElementById('setup-banner-connect').addEventListener('click', openSettingsModal);
  document.getElementById('setup-banner-dismiss').addEventListener('click', function(){
    document.getElementById('setup-banner').classList.add('hidden');
  });

  /* Calendar toolbar (static controls) */
  document.getElementById('cal-subview-tabs').addEventListener('click', function(e){
    var btn = e.target.closest('button[data-subview]');
    if(!btn) return;
    state.calSubView = btn.dataset.subview;
    render();
  });
  document.getElementById('cal-prev').addEventListener('click', function(){ calNavStep(-1); });
  document.getElementById('cal-next').addEventListener('click', function(){ calNavStep(1); });
  document.getElementById('cal-today').addEventListener('click', function(){ state.calAnchor = todayStr(); render(); });
  document.getElementById('cal-search-input').addEventListener('input', function(e){
    state.calSearch = e.target.value;
    render();
  });
  document.getElementById('add-event-btn').addEventListener('click', function(){ openAddEventModal(state.calAnchor); });
  document.getElementById('open-family-settings').addEventListener('click', openFamilySettingsModal);

  /* app title/subtitle persistence (local only, cosmetic) */
  function loadMeta(){
    try{
      var m = JSON.parse(localStorage.getItem(LS_META) || 'null');
      if(m){
        document.getElementById('app-title').textContent = m.title;
        document.getElementById('app-subtitle').textContent = m.subtitle;
      }
    }catch(e){}
  }
  function saveMeta(){
    localStorage.setItem(LS_META, JSON.stringify({
      title: document.getElementById('app-title').textContent,
      subtitle: document.getElementById('app-subtitle').textContent
    }));
  }
  document.getElementById('app-title').addEventListener('blur', saveMeta);
  document.getElementById('app-subtitle').addEventListener('blur', saveMeta);

  /* ================= INIT ================= */
  loadMeta();
  loadIdentity().then(function(){
    resolveCurrentFamilyMember();
    if(state.view === 'calendar') render();
  });
  loadFromGitHub();
  loadCalendarFromGitHub();

})();
</script>
