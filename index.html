<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;0,700;1,500;1,600;1,700&family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --paper:#f9f2e9;
    --surface:#fffbf6;
    --ink:#322318;
    --ink-muted:#6d6059;
    --hairline:#d5ccc4;
    --do-first:#bc5460;
    --schedule:#008fa0;
    --delegate:#8765be;
    --eliminate:#3e8f44;
    --do-first-tint:#f6e8e9;
    --schedule-tint:#e6f2f3;
    --delegate-tint:#efe9f5;
    --eliminate-tint:#e9f2ea;
    --avatar-you:#13808a;
    --avatar-monisha:#955c82;
    --due-today:#7a4a00;
    --due-today-bg:#f3e6cf;
    --overdue:#a8372e;
    --overdue-bg:#f5dcda;
    --primary-btn:#462c19;
    --radius-card:8px;
    --radius-panel:10px;
    --radius-pill:999px;
    --pad:18px;
    --gap:16px;
    --font-serif:'Lora', serif;
    --font-sans:'Work Sans', sans-serif;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:var(--paper);
    color:var(--ink);
    font-family:var(--font-sans);
    font-size:14px;
    line-height:1.45;
    min-height:100vh;
  }
  .wrap{max-width:1320px;margin:0 auto;padding:24px 24px 60px;}
  a{color:inherit;}
  button{font-family:inherit;cursor:pointer;}
  input,textarea{font-family:inherit;}

  /* ---------- Header ---------- */
  header.app-header{margin-bottom:20px;}
  .header-top{display:flex;flex-wrap:wrap;gap:16px;align-items:flex-start;justify-content:space-between;}
  .brand h1{font-family:var(--font-serif);font-size:32px;font-weight:700;margin:0;}
  .brand p{margin:2px 0 0;font-size:13.5px;color:var(--ink-muted);}
  .brand h1[contenteditable], .brand p[contenteditable]{outline:none;border-radius:4px;}
  .brand h1[contenteditable]:hover, .brand p[contenteditable]:hover{background:rgba(0,0,0,0.03);}

  .view-switcher{display:inline-flex;background:var(--hairline);background:rgba(213,204,196,0.45);padding:4px;border-radius:var(--radius-pill);gap:2px;}
  .view-switcher button{border:none;background:transparent;padding:8px 16px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;color:var(--ink-muted);}
  .view-switcher button.active{background:var(--surface);color:var(--ink);box-shadow:0 2px 6px rgba(50,35,24,0.12);}

  .header-row2{display:flex;flex-wrap:wrap;gap:12px;align-items:center;margin-top:14px;justify-content:space-between;}
  .filters-search{display:flex;flex-wrap:wrap;gap:10px;align-items:center;}
  .pill-tabs{display:inline-flex;gap:4px;background:rgba(213,204,196,0.3);padding:4px;border-radius:var(--radius-pill);}
  .pill-tabs button{border:none;background:transparent;padding:7px 14px;border-radius:var(--radius-pill);font-size:12.5px;font-weight:600;color:var(--ink-muted);}
  .pill-tabs button.active{background:var(--primary-btn);color:#fff;}

  .search-box{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius-pill);padding:7px 14px;min-width:220px;}
  .search-box svg{flex:none;opacity:0.5;}
  .search-box input{border:none;outline:none;background:transparent;font-size:13px;width:100%;color:var(--ink);}

  .quick-add{display:flex;gap:8px;align-items:center;flex:1;min-width:260px;max-width:520px;}
  .quick-add input{flex:1;border:1.5px dashed var(--hairline);border-radius:var(--radius-pill);padding:9px 16px;background:var(--surface);font-size:13px;outline:none;color:var(--ink);}
  .quick-add input:focus{border-color:var(--schedule);}
  .quick-add button{border:none;background:var(--primary-btn);color:#fff;padding:9px 20px;border-radius:var(--radius-pill);font-size:13px;font-weight:600;white-space:nowrap;}
  .quick-add button:hover{opacity:0.9;}
  .quick-add button.btn-add-detail{background:transparent;border:1.5px solid var(--primary-btn);color:var(--primary-btn);padding:8px 16px;}
  .quick-add button.btn-add-detail:hover{background:rgba(70,44,25,0.06);opacity:1;}

  .stats-row{display:flex;flex-wrap:wrap;gap:8px;margin-top:14px;align-items:center;}
  .stat-pill{display:inline-flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--hairline);padding:5px 12px;border-radius:var(--radius-pill);font-size:12px;font-weight:600;color:var(--ink-muted);}
  .stat-dot{width:8px;height:8px;border-radius:50%;flex:none;}
  .stat-pill.done-today{background:#e6f3e7;border-color:#bfe0c2;color:#2c6b30;}

  .sync-status{font-size:11.5px;color:var(--ink-muted);display:flex;align-items:center;gap:6px;margin-left:auto;cursor:pointer;user-select:none;}
  .sync-status .dot{width:7px;height:7px;border-radius:50%;background:#9aa;}
  .sync-status.ok .dot{background:#3e8f44;}
  .sync-status.err .dot{background:#a8372e;}
  .sync-status.busy .dot{background:#c9922f;}
  .settings-gear{border:1px solid var(--hairline);background:var(--surface);width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex:none;}

  .cal-nav{display:flex;align-items:center;gap:6px;}
  .cal-nav button{border:1px solid var(--hairline);background:var(--surface);border-radius:var(--radius-pill);padding:6px 12px;font-size:13px;font-weight:600;color:var(--ink);}
  .cal-nav #cal-prev,.cal-nav #cal-next{width:30px;padding:6px 0;text-align:center;}
  .cal-period-label{font-family:var(--font-serif);font-weight:600;font-size:14px;margin-left:4px;white-space:nowrap;}

  /* ---------- Matrix ---------- */
  .matrix-outer{margin-top:22px;}
  .matrix-cross{display:grid;grid-template-columns:28px 1fr 1fr;grid-template-rows:24px 1fr 1fr;column-gap:var(--gap);row-gap:var(--gap);}
  .axis-top{grid-row:1;text-align:center;font-size:12px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;text-decoration:underline;text-underline-offset:4px;color:var(--ink-muted);}
  .axis-top.urgent{grid-column:2;}
  .axis-top.not-urgent{grid-column:3;}
  .axis-left{grid-column:1;text-align:center;font-size:12px;font-weight:800;letter-spacing:0.08em;text-transform:uppercase;text-decoration:underline;text-underline-offset:4px;color:var(--ink-muted);writing-mode:vertical-rl;transform:rotate(180deg);display:flex;align-items:center;justify-content:center;}
  .axis-left.important{grid-row:2;}
  .axis-left.not-important{grid-row:3;}

  .quadrant{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius-panel);display:flex;flex-direction:column;overflow:hidden;}
  .q-do-first{grid-column:2;grid-row:2;}
  .q-schedule{grid-column:3;grid-row:2;}
  .q-delegate{grid-column:2;grid-row:3;}
  .q-eliminate{grid-column:3;grid-row:3;}

  .q-header{display:flex;align-items:flex-start;gap:8px;padding:14px var(--pad) 10px;border-bottom:1px solid var(--hairline);}
  .q-header .dot{width:10px;height:10px;border-radius:50%;margin-top:5px;flex:none;}
  .q-header-text{flex:1;min-width:0;}
  .q-header-text .q-title{font-family:var(--font-serif);font-style:italic;font-weight:700;font-size:18px;line-height:1.2;}
  .q-header-text .q-subtitle{font-size:12px;color:var(--ink-muted);margin-top:2px;}
  .q-count{background:rgba(50,35,24,0.08);padding:3px 10px;border-radius:var(--radius-pill);font-size:12px;font-weight:700;flex:none;}

  .q-do-first .q-header{background:var(--do-first-tint);}
  .q-schedule .q-header{background:var(--schedule-tint);}
  .q-delegate .q-header{background:var(--delegate-tint);}
  .q-eliminate .q-header{background:var(--eliminate-tint);}

  .q-body{padding:12px;min-height:220px;max-height:460px;overflow-y:auto;display:flex;flex-direction:column;gap:10px;transition:background .12s,border-color .12s;border:2px dashed transparent;border-radius:0 0 var(--radius-panel) var(--radius-panel);}
  .q-body.drag-over{border-color:currentColor;}
  .q-do-first .q-body.drag-over{background:var(--do-first-tint);color:var(--do-first);}
  .q-schedule .q-body.drag-over{background:var(--schedule-tint);color:var(--schedule);}
  .q-delegate .q-body.drag-over{background:var(--delegate-tint);color:var(--delegate);}
  .q-eliminate .q-body.drag-over{background:var(--eliminate-tint);color:var(--eliminate);}

  .q-empty{margin:auto;text-align:center;font-style:italic;color:var(--ink-muted);font-size:12.5px;padding:20px;}

  /* ---------- Task card ---------- */
  .task-card{background:var(--paper);border:1px solid var(--hairline);border-radius:var(--radius-card);padding:12px 14px;box-shadow:0 2px 6px rgba(50,35,24,0.12);cursor:pointer;position:relative;}
  .task-card:active{cursor:grabbing;}
  .task-card.dragging{opacity:0.4;}
  .tc-top{display:flex;align-items:flex-start;gap:8px;}
  .tc-check{width:18px;height:18px;border-radius:50%;border:1.5px solid var(--hairline);background:var(--surface);flex:none;margin-top:1px;display:flex;align-items:center;justify-content:center;}
  .tc-check.checked{background:var(--eliminate);border-color:var(--eliminate);color:#fff;font-size:11px;}
  .tc-title{flex:1;font-size:14px;font-weight:500;color:var(--ink);word-break:break-word;}
  .tc-title.done{text-decoration:line-through;opacity:0.55;}
  .tc-avatars{display:flex;flex:none;}
  .avatar{width:22px;height:22px;border-radius:50%;color:#fff;font-size:10.5px;font-weight:700;display:flex;align-items:center;justify-content:center;border:2px solid var(--paper);}
  .avatar.you{background:var(--avatar-you);}
  .avatar.monisha{background:var(--avatar-monisha);margin-left:-8px;}

  .tc-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;}
  .meta-pill{font-size:10.5px;font-weight:600;padding:3px 9px;border-radius:var(--radius-pill);background:rgba(50,35,24,0.06);color:var(--ink-muted);white-space:nowrap;}
  .meta-pill.due-overdue{background:var(--overdue-bg);color:var(--overdue);}
  .meta-pill.due-today{background:var(--due-today-bg);color:var(--due-today);}
  .meta-pill.aging{background:rgba(50,35,24,0.06);color:var(--ink-muted);}
  .meta-pill.aging.alert{background:var(--overdue-bg);color:var(--overdue);}
  .meta-pill.tag{background:rgba(0,143,160,0.1);color:#0b6b78;}

  /* below 640px: stack quadrants */
  @media (max-width:640px){
    .matrix-cross{display:flex;flex-direction:column;gap:var(--gap);}
    .axis-top,.axis-left{display:none;}
    .quadrant{width:100%;}
  }

  /* below 480px: modal fields stop fighting for width on phones */
  @media (max-width:480px){
    .scrim{padding:0;align-items:stretch;}
    .modal{max-width:100%;min-height:100%;border-radius:0;padding:18px 16px 24px;}
    .modal-title-input{font-size:19px;}
    .row-2{flex-direction:column;gap:16px;}
    .priority-grid{gap:6px;}
    .priority-btn{font-size:12px;padding:9px 8px;}
    .seg3 button{font-size:11.5px;padding:9px 2px;}
  }

  /* ---------- List view ---------- */
  .list-view{margin-top:22px;display:flex;flex-direction:column;gap:18px;}
  .list-group{background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius-panel);overflow:hidden;}
  .list-row{display:flex;align-items:center;gap:10px;padding:10px 16px;border-bottom:1px solid var(--hairline);cursor:pointer;}
  .list-row:last-child{border-bottom:none;}
  .list-row:hover{background:rgba(50,35,24,0.03);}
  .list-row .tc-title{flex:1;font-size:13.5px;}
  .list-empty{padding:16px;font-style:italic;color:var(--ink-muted);font-size:12.5px;text-align:center;}

  /* ---------- Archive view ---------- */
  .archive-view{margin-top:22px;background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius-panel);overflow:hidden;}
  .archive-row{display:flex;align-items:center;gap:12px;padding:12px 16px;border-bottom:1px solid var(--hairline);}
  .archive-row:last-child{border-bottom:none;}
  .archive-row .tc-title{flex:1;font-size:13.5px;}
  .archive-date{font-size:11.5px;color:var(--ink-muted);white-space:nowrap;}
  .btn-sm{border:1px solid var(--hairline);background:var(--surface);padding:5px 12px;border-radius:var(--radius-pill);font-size:11.5px;font-weight:600;color:var(--ink);}
  .btn-sm:hover{background:rgba(50,35,24,0.05);}
  .btn-sm.danger{border-color:var(--overdue);color:var(--overdue);}

  /* ---------- Calendar module ---------- */
  .cal-wrap{margin-top:22px;}

  /* Countdown strip */
  .countdown-strip{display:flex;gap:12px;overflow-x:auto;padding-bottom:10px;margin-bottom:20px;}
  .countdown-card{flex:none;min-width:150px;background:var(--surface);border:1px solid var(--hairline);border-radius:var(--radius-panel);padding:14px 16px;box-shadow:0 2px 6px rgba(50,35,24,0.1);cursor:pointer;}
  .countdown-card .cc-icon{font-size:20px;}
  .countdown-card .cc-title{font-family:var(--font-serif);font-weight:700;font-size:14px;margin-top:6px;line-height:1.2;}
  .countdown-card .cc-when{font-size:11.5px;color:var(--ink-muted);margin-top:4px;font-weight:600;}
  .countdown-card .cc-when.today{color:var(--overdue);}

  /* Event chip (shared by month/week/agenda) */
  .event-chip{display:flex;align-items:center;gap:5px;padding:3px 8px;border-radius:var(--radius-pill);font-size:11px;font-weight:600;cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:#fff;}
  .event-chip .ec-icon{flex:none;}
  .event-chip .ec-title{overflow:hidden;text-overflow:ellipsis;}

  /* Month grid (Fridge Calendar) */
  .month-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:6px;}
  .month-weekday{text-align:center;font-size:11px;font-weight:800;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-muted);padding-bottom:6px;}
  .month-cell{background:var(--surface);border:1px solid var(--hairline);border-radius:8px;min-height:96px;padding:6px;display:flex;flex-direction:column;gap:3px;min-width:0;}
  .month-cell.outside{background:rgba(213,204,196,0.15);opacity:0.55;}
  .month-cell.today{border-color:var(--schedule);border-width:2px;}
  .month-cell .mc-num{font-size:11.5px;font-weight:700;color:var(--ink-muted);}
  .month-cell.today .mc-num{color:var(--schedule);}
  .month-more{font-size:10.5px;color:var(--ink-muted);font-weight:600;cursor:pointer;padding:2px 4px;}

  /* Week lanes (Family Lanes) */
  .week-wrap{overflow-x:auto;}
  .week-grid{display:grid;grid-template-columns:110px repeat(7,minmax(110px,1fr));gap:6px;min-width:700px;}
  .week-head{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:0.05em;color:var(--ink-muted);text-align:center;padding-bottom:6px;}
  .week-head.today{color:var(--schedule);}
  .week-lane-label{display:flex;align-items:center;gap:6px;font-size:12.5px;font-weight:700;padding:8px 4px;}
  .week-lane-label .adot{width:10px;height:10px;border-radius:50%;flex:none;}
  .week-cell{background:var(--surface);border:1px solid var(--hairline);border-radius:8px;min-height:64px;padding:5px;display:flex;flex-direction:column;gap:3px;min-width:0;}
  .week-cell.today{border-color:var(--schedule);border-width:2px;}

  /* Agenda rail */
  .agenda-rail{display:flex;flex-direction:column;gap:22px;}
  .agenda-day-label{font-family:var(--font-serif);font-weight:700;font-size:16px;display:flex;align-items:center;gap:8px;}
  .agenda-day-label .today-badge{background:var(--schedule);color:#fff;font-size:10.5px;font-weight:700;padding:2px 9px;border-radius:var(--radius-pill);}
  .agenda-cards{display:flex;flex-direction:column;gap:8px;margin-top:10px;}
  .agenda-card{display:flex;align-items:flex-start;gap:12px;background:var(--surface);border:1px solid var(--hairline);border-left:4px solid var(--ink-muted);border-radius:var(--radius-card);padding:12px 14px;box-shadow:0 2px 6px rgba(50,35,24,0.1);cursor:pointer;}
  .agenda-card .ac-icon{font-size:18px;flex:none;}
  .agenda-card .ac-body{flex:1;min-width:0;}
  .agenda-card .ac-title{font-weight:600;font-size:13.5px;}
  .agenda-card .ac-meta{font-size:11.5px;color:var(--ink-muted);margin-top:3px;}
  .agenda-card .ac-avatars{flex:none;display:flex;}
  .agenda-empty{font-style:italic;color:var(--ink-muted);font-size:12.5px;}

  /* Kid mode: bigger touch targets across the calendar */
  body.kid-mode .cal-wrap .event-chip{font-size:12.5px;padding:5px 10px;}
  body.kid-mode .cal-wrap .agenda-card{padding:16px 18px;}
  body.kid-mode .cal-wrap .agenda-card .ac-title{font-size:16px;}
  body.kid-mode .cal-wrap .agenda-card .ac-icon{font-size:24px;}
  body.kid-mode .cal-wrap .cat-btn,
  body.kid-mode #calendar-toolbar button{font-size:14px;padding:10px 16px;}
  body.kid-mode .countdown-card{min-width:170px;padding:18px 20px;}
  body.kid-mode .countdown-card .cc-title{font-size:16px;}

  @media (max-width:640px){
    .month-grid{grid-template-columns:repeat(7,1fr);gap:3px;}
    .month-cell{min-height:64px;padding:4px;}
    .month-cell .mc-num{font-size:10px;}
    .event-chip{font-size:9.5px;padding:2px 5px;}
  }

  /* ---------- Modal ---------- */
  .scrim{position:fixed;inset:0;background:rgba(50,35,24,0.35);display:flex;align-items:flex-start;justify-content:center;padding:5vh 16px;overflow-y:auto;z-index:100;}
  .modal{background:var(--surface);border-radius:14px;max-width:560px;width:100%;box-shadow:0 20px 60px rgba(50,35,24,0.3);padding:26px;margin:auto;}
  .modal-title-input{width:100%;font-family:var(--font-serif);font-size:21px;font-weight:600;border:none;border-bottom:2px solid var(--hairline);outline:none;background:transparent;padding:4px 2px 8px;color:var(--ink);}
  .modal-title-input:focus{border-color:var(--schedule);}
  .field-label{font-size:11px;font-weight:700;letter-spacing:0.06em;text-transform:uppercase;color:var(--ink-muted);margin:18px 0 8px;}
  .priority-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;}
  .priority-btn{min-width:0;border:1.5px solid var(--hairline);background:var(--surface);padding:10px;border-radius:8px;font-size:12.5px;font-weight:700;text-align:left;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .priority-btn.sel-do-first{border-color:var(--do-first);background:var(--do-first-tint);color:var(--do-first);}
  .priority-btn.sel-schedule{border-color:var(--schedule);background:var(--schedule-tint);color:var(--schedule);}
  .priority-btn.sel-delegate{border-color:var(--delegate);background:var(--delegate-tint);color:var(--delegate);}
  .priority-btn.sel-eliminate{border-color:var(--eliminate);background:var(--eliminate-tint);color:var(--eliminate);}

  .seg3{display:flex;border:1.5px solid var(--hairline);border-radius:var(--radius-pill);overflow:hidden;}
  .seg3 button{flex:1;min-width:0;border:none;background:var(--surface);padding:9px 4px;font-size:12.5px;font-weight:600;color:var(--ink-muted);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .seg3 button.active{background:var(--primary-btn);color:#fff;}

  .row-2{display:flex;gap:12px;}
  .row-2 > div{flex:1;min-width:0;}
  input[type=date],.text-input{width:100%;max-width:100%;box-sizing:border-box;border:1.5px solid var(--hairline);border-radius:8px;padding:9px 12px;font-size:13px;outline:none;background:var(--surface);color:var(--ink);}
  input[type=date]:focus,.text-input:focus{border-color:var(--schedule);}
  .status-toggle{width:100%;border:1.5px solid var(--hairline);background:var(--surface);border-radius:8px;padding:9px;font-size:13px;font-weight:600;}
  .status-toggle.complete{background:var(--eliminate);border-color:var(--eliminate);color:#fff;}

  .tag-list{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:8px;}
  .tag-chip{display:inline-flex;align-items:center;gap:6px;background:rgba(0,143,160,0.1);color:#0b6b78;padding:4px 10px;border-radius:var(--radius-pill);font-size:12px;font-weight:600;}
  .tag-chip button{border:none;background:transparent;color:inherit;font-size:12px;line-height:1;padding:0;}
  .dashed-input{border:1.5px dashed var(--hairline);border-radius:var(--radius-pill);padding:6px 14px;font-size:12px;outline:none;background:transparent;width:100%;color:var(--ink);}
  .dashed-input:focus{border-color:var(--schedule);}

  /* ---------- Event modal extras ---------- */
  .category-grid{display:flex;flex-wrap:wrap;gap:6px;margin-bottom:6px;}
  .cat-btn{border:1.5px solid var(--hairline);background:var(--surface);border-radius:var(--radius-pill);padding:6px 12px;font-size:12px;font-weight:600;color:var(--ink-muted);white-space:nowrap;}
  .cat-btn.selected{border-color:var(--primary-btn);background:rgba(70,44,25,0.08);color:var(--ink);}
  .attendee-chip{cursor:pointer;opacity:0.45;user-select:none;}
  .attendee-chip.active{opacity:1;}
  .attendee-chip .adot{width:8px;height:8px;border-radius:50%;display:inline-block;}
  .check-inline{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:600;color:var(--ink);padding-top:10px;cursor:pointer;}
  .check-inline input{width:16px;height:16px;flex:none;}
  .weekday-picker{display:flex;gap:5px;margin-top:10px;flex-wrap:wrap;}
  .weekday-picker button{width:32px;height:32px;border-radius:50%;border:1.5px solid var(--hairline);background:var(--surface);font-size:12px;font-weight:700;color:var(--ink-muted);flex:none;}
  .weekday-picker button.selected{background:var(--primary-btn);color:#fff;border-color:var(--primary-btn);}
  .ends-row{display:flex;flex-direction:column;gap:8px;margin-top:8px;margin-bottom:16px;}
  .ends-option{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--ink);cursor:pointer;}
  .ends-option input[type=radio]{width:15px;height:15px;flex:none;}
  .ends-option input[type=date],.ends-option input[type=number]{width:130px;padding:6px 10px;font-size:12px;border:1.5px solid var(--hairline);border-radius:8px;background:var(--surface);color:var(--ink);}
  .ends-option input:disabled{opacity:0.4;}

  .subtask-row{display:flex;align-items:center;gap:8px;padding:4px 0;}
  .subtask-row input[type=checkbox]{width:16px;height:16px;flex:none;}
  .subtask-row .st-text{flex:1;font-size:13px;}
  .subtask-row .st-text.done{text-decoration:line-through;opacity:0.55;}
  .subtask-row button.rm{border:none;background:transparent;color:var(--ink-muted);font-size:13px;}

  textarea.notes{width:100%;min-height:70px;border:1.5px solid var(--hairline);border-radius:8px;padding:10px 12px;font-size:13px;outline:none;resize:vertical;background:var(--surface);color:var(--ink);}
  textarea.notes:focus{border-color:var(--schedule);}

  .activity-log{display:flex;flex-direction:column;gap:6px;max-height:140px;overflow-y:auto;}
  .activity-log div{font-size:12px;color:var(--ink-muted);}

  .modal-footer{margin-top:22px;display:flex;justify-content:space-between;align-items:center;border-top:1px solid var(--hairline);padding-top:16px;}
  .btn-close{border:none;background:var(--primary-btn);color:#fff;padding:8px 18px;border-radius:var(--radius-pill);font-size:12.5px;font-weight:600;}
  .btn-delete{border:1.5px solid var(--overdue);color:var(--overdue);background:transparent;padding:8px 16px;border-radius:var(--radius-pill);font-size:12.5px;font-weight:600;}

  /* ---------- Settings modal ---------- */
  .settings-field{margin-bottom:12px;}
  .settings-field label{display:block;font-size:11.5px;font-weight:700;color:var(--ink-muted);margin-bottom:4px;text-transform:uppercase;letter-spacing:0.05em;}
  .settings-help{font-size:12px;color:var(--ink-muted);margin-top:14px;line-height:1.5;}
  .settings-help a{color:var(--schedule);}
  .settings-actions{display:flex;gap:10px;margin-top:18px;}
  .btn-primary{border:none;background:var(--primary-btn);color:#fff;padding:9px 18px;border-radius:var(--radius-pill);font-size:12.5px;font-weight:600;}
  .banner{display:flex;align-items:center;gap:10px;background:var(--due-today-bg);border:1px solid #e0c58e;color:var(--due-today);padding:10px 16px;border-radius:8px;font-size:12.5px;margin-bottom:16px;}
  .banner button{margin-left:auto;border:none;background:var(--primary-btn);color:#fff;padding:6px 14px;border-radius:var(--radius-pill);font-size:11.5px;font-weight:600;flex:none;}
  .banner .dismiss{background:transparent;color:var(--due-today);border:1px solid currentColor;}

  .family-row{display:flex;align-items:center;gap:8px;margin-bottom:10px;}
  .family-row .fam-name{flex:1.2;min-width:0;}
  .family-row .fam-email{flex:1.6;min-width:0;}
  .family-row .fam-role{flex:none;width:120px;}
  .color-swatch{width:28px;height:28px;border-radius:50%;border:2px solid var(--surface);box-shadow:0 0 0 1.5px var(--hairline);flex:none;padding:0;}
  .family-row .rm{border:none;background:transparent;color:var(--ink-muted);font-size:14px;flex:none;padding:4px;}
  @media (max-width:480px){
    .family-row{flex-wrap:wrap;}
    .family-row .fam-name,.family-row .fam-email{flex:1 1 100%;}
    .family-row .fam-role{flex:1;width:auto;}
  }

  /* ---------- Toast ---------- */
  .toast-wrap{position:fixed;bottom:28px;left:0;right:0;display:flex;justify-content:center;pointer-events:none;z-index:200;}
  .toast{background:var(--primary-btn);color:#fff;padding:11px 20px;border-radius:var(--radius-pill);font-size:12.5px;font-weight:600;display:flex;align-items:center;gap:10px;box-shadow:0 8px 24px rgba(0,0,0,0.25);opacity:0;transform:translateY(12px);transition:opacity .2s,transform .2s;pointer-events:auto;}
  .toast.show{opacity:1;transform:translateY(0);}
  .toast button{border:none;background:transparent;color:#ffd27a;font-weight:700;font-size:12.5px;}

  .hidden{display:none !important;}
</style>
</head>
<body>
<div class="wrap">

  <div id="setup-banner" class="banner hidden">
    <span>GitHub sync isn't set up yet — tasks are only saved on this device. Connect it so you and Monisha see the same list.</span>
    <button id="setup-banner-connect">Set up sync</button>
    <button id="setup-banner-dismiss" class="dismiss">Dismiss</button>
  </div>

  <header class="app-header">
    <div class="header-top">
      <div class="brand">

      <div style="display:flex;align-items:center;gap:10px;">

          <button data-view="matrix" class="active">Matrix</button>
          <button data-view="list">List</button>
          <button data-view="archive">Archive</button>
          <button data-view="calendar">Calendar</button>

        <button class="settings-gear" id="open-settings" title="GitHub sync settings">⚙</button>
      </div>
    </div>

    <div class="header-row2" id="task-toolbar">
      <div class="filters-search">
        <div class="pill-tabs" id="person-tabs">
          <button data-person="all" class="active">All</button>
          <button data-person="me">Shiva</button>
          <button data-person="monisha">Monisha</button>
          <button data-person="shared">Shared</button>
        </div>
        <div class="search-box">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <input type="text" id="search-input" placeholder="Search tasks or tags">
        </div>
      </div>
      <div class="quick-add">
        <input type="text" id="quick-add-input" placeholder="Quick add a task… try 'urgent' or 'tomorrow'">
        <button id="quick-add-btn">Add</button>
        <button id="add-task-full-btn" class="btn-add-detail" title="Add a task with all details set up front">Add Task…</button>

    <div class="header-row2 hidden" id="calendar-toolbar">
      <div class="filters-search">
        <div class="pill-tabs" id="cal-subview-tabs">

          <button data-subview="week">Week</button>
          <button data-subview="month">Month</button>
        </div>
        <div class="cal-nav">
          <button id="cal-prev" title="Previous">‹</button>
          <button id="cal-today" title="Jump to today">Today</button>
          <button id="cal-next" title="Next">›</button>
          <span class="cal-period-label" id="cal-period-label"></span>
        </div>
        <div class="pill-tabs" id="cal-family-tabs"></div>
      </div>
      <div class="quick-add">
        <input type="text" id="cal-search-input" placeholder="Search events">
        <button id="add-event-btn">Add Event…</button>
        <button id="open-family-settings" class="btn-add-detail" title="Manage family members">Family…</button>
      </div>
    </div>

    <div class="stats-row" id="stats-row"></div>
  </header>

  <main id="view-root"></main>
</div>

<div id="modal-root"></div>
<div class="toast-wrap"><div class="toast" id="toast"></div></div>

<script>
(function(){
  "use strict";

  /* ================= CONSTANTS ================= */
  var QUADRANTS = {
    doFirst:   { key:'doFirst',   title:'Do First',  subtitle:'Urgent & Important',      accent:'var(--do-first)',   cls:'q-do-first',   important:true,  urgent:true  },
    schedule:  { key:'schedule',  title:'Schedule',  subtitle:'Important, Not Urgent',   accent:'var(--schedule)',   cls:'q-schedule',   important:true,  urgent:false },
    delegate:  { key:'delegate',  title:'Delegate',  subtitle:'Urgent, Not Important',   accent:'var(--delegate)',   cls:'q-delegate',   important:false, urgent:true  },
    eliminate: { key:'eliminate', title:'Eliminate', subtitle:'Neither',                 accent:'var(--eliminate)',  cls:'q-eliminate',  important:false, urgent:false }
  };
  var QUADRANT_ORDER = ['doFirst','schedule','delegate','eliminate'];
  var URGENT_WORDS = ['urgent','asap','today','tomorrow','deadline','!!'];
  var NOT_IMPORTANT_WORDS = ['maybe','someday','minor','low priority','junk','declutter'];
  var LS_TASKS = 'eisenhower_tasks_local_v1';
  var LS_CALENDAR = 'eisenhower_calendar_local_v1';
  var LS_CONFIG = 'eisenhower_gh_config_v1';
  var LS_META = 'eisenhower_meta_v1'; // title/subtitle

  /* ================= UTIL ================= */
  function uid(){ return (crypto.randomUUID ? crypto.randomUUID() : 'id-'+Date.now()+'-'+Math.random().toString(16).slice(2)); }
  function nowISO(){ return new Date().toISOString(); }
  // Local-calendar-day date string (never UTC) -- toISOString() would shift the date near midnight
  // depending on the viewer's timezone, which is wrong for "today"/due-date/calendar-day logic.
  function toLocalDateStr(d){
    var y = d.getFullYear(), m = d.getMonth()+1, day = d.getDate();
    return y + '-' + (m<10?'0':'') + m + '-' + (day<10?'0':'') + day;
  }
  function todayStr(){ return toLocalDateStr(new Date()); }
  function fmtDate(d){
    if(!d) return '';
    var dt = new Date(d+'T00:00:00');
    if(isNaN(dt)) return d;
    return dt.toLocaleDateString(undefined,{month:'short',day:'numeric'});
  }
  function fmtRelative(iso){
    var diff = Date.now() - new Date(iso).getTime();
    var m = Math.floor(diff/60000);
    if(m < 1) return 'just now';
    if(m < 60) return m+'m ago';
    var h = Math.floor(m/60);
    if(h < 24) return h+'h ago';
    var d = Math.floor(h/24);
    return d+'d ago';
  }
  function quadrantOf(task){
    if(task.importance && task.urgency) return 'doFirst';
    if(task.importance && !task.urgency) return 'schedule';
    if(!task.importance && task.urgency) return 'delegate';
    return 'eliminate';
  }
  function agingDays(task){
    if(!task.quadrantEnteredAt) return 0;
    var diff = Date.now() - new Date(task.quadrantEnteredAt).getTime();
    return Math.floor(diff/86400000);
  }
  function escapeHtml(s){
    return String(s==null?'':s).replace(/[&<>"']/g,function(c){
      return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c];
    });
  }
  function debounce(fn, ms){
    var t;
    return function(){
      var args = arguments, ctx = this;
      clearTimeout(t);
      t = setTimeout(function(){ fn.apply(ctx,args); }, ms);
    };
  }
  function b64EncodeUnicode(str){
    return btoa(encodeURIComponent(str).replace(/%([0-9A-F]{2})/g, function(_,p1){
      return String.fromCharCode('0x'+p1);
    }));
  }
  function b64DecodeUnicode(str){
    return decodeURIComponent(atob(str.replace(/\n/g,'')).split('').map(function(c){
      return '%' + ('00'+c.charCodeAt(0).toString(16)).slice(-2);
    }).join(''));
  }

  /* ================= STATE ================= */
  var state = {
    tasks: [],
    view: 'matrix',
    person: 'all',
    search: '',
    ghSha: null,
    syncStatus: 'idle', // idle | busy | ok | err | local
    deletedBuffer: null, // {task, index} for undo
    currentUserEmail: null, // filled in from Cloudflare Access identity, if available

    // ---- Calendar module ----
    family: [],           // [{id,name,color,email,role:'adult'|'kid'}]
    events: [],           // see EVENT SCHEMA below
    calSha: null,
    calSubView: 'agenda', // 'agenda' | 'month' | 'week'
    calAnchor: todayStr(),// reference date for month/week/agenda navigation
    calFilter: 'all',     // 'all' or a family member id
    calSearch: '',
    currentFamilyMember: null // resolved from currentUserEmail against state.family
  };

  var SHIVA_EMAIL = 'dearshiva@gmail.com';
  var pendingNewTaskId = null; // set while the Add Task modal is open for a not-yet-confirmed task

  /*
    EVENT SCHEMA:
    {
      id, title, category: 'school'|'sports'|'birthday'|'appointment'|'trip'|'chore'|'other',
      attendees: ['all'] | [familyMemberId, ...],
      date: 'YYYY-MM-DD', endDate: null|'YYYY-MM-DD' (inclusive, for multi-day events),
      allDay: true|false, time: null|'HH:MM',
      location: '', notes: '',
      recurrence: null | { freq:'daily'|'weekly'|'monthly'|'yearly', interval:1, byWeekday:null|[0-6], until:null|'YYYY-MM-DD', count:null|number },
      exceptionDates: [],           // dates skipped from this series (only meaningful when recurrence is set)
      recurrenceId: null|masterId,  // set on a standalone event that overrides one occurrence of a series
      overrideDate: null|'YYYY-MM-DD',
      createdBy: null|familyMemberId, createdAt: iso
    }
  */
  var EVENT_CATEGORIES = {
    school:      { label:'School',      icon:'🎒', color:'#008fa0' },
    sports:      { label:'Sports',      icon:'⚽', color:'#3e8f44' },
    birthday:    { label:'Birthday',    icon:'🎂', color:'#bc5460' },
    appointment: { label:'Appointment', icon:'🩺', color:'#8765be' },
    trip:        { label:'Trip',        icon:'✈️', color:'#c9922f' },
    chore:       { label:'Chore',       icon:'🧹', color:'#6d6059' },
    other:       { label:'Other',       icon:'📌', color:'#462c19' }
  };
  var FAMILY_COLOR_PALETTE = ['#13808a','#955c82','#bc5460','#008fa0','#8765be','#3e8f44','#c9922f','#a8372e'];

  /* ================= IDENTITY (Cloudflare Access) ================= */
  function defaultAssignee(){
    return (state.currentUserEmail === SHIVA_EMAIL) ? 'me' : 'monisha';
  }
  function resolveCurrentFamilyMember(){
    state.currentFamilyMember = (state.currentUserEmail
      ? state.family.find(function(m){ return m.email && m.email.toLowerCase() === state.currentUserEmail; })
      : null) || null;
  }
  function isKidMode(){
    return !!(state.currentFamilyMember && state.currentFamilyMember.role === 'kid');
  }
  function loadIdentity(){
    try{
      return fetch('/cdn-cgi/access/get-identity', { credentials: 'include' })
        .then(function(res){ return res.ok ? res.json() : null; })
        .then(function(data){
          state.currentUserEmail = (data && data.email) ? String(data.email).toLowerCase() : null;
        })
        .catch(function(){
          state.currentUserEmail = null;
        });
    }catch(e){
      state.currentUserEmail = null;
      return Promise.resolve();
    }
  }

  /* ================= CONFIG / GITHUB ================= */
  function getConfig(){
    try{ return JSON.parse(localStorage.getItem(LS_CONFIG) || 'null'); }catch(e){ return null; }
  }
  function setConfig(cfg){
    localStorage.setItem(LS_CONFIG, JSON.stringify(cfg));
  }
  function clearConfig(){
    localStorage.removeItem(LS_CONFIG);
  }
  function ghContentsUrl(cfg, path){
    return 'https://api.github.com/repos/'+cfg.owner+'/'+cfg.repo+'/contents/'+encodeURIComponent(path);
  }
  function ghGetUrl(cfg, path){
    return ghContentsUrl(cfg, path)+'?ref='+encodeURIComponent(cfg.branch||'main');
  }
  function ghHeaders(cfg){
    return {
      'Authorization': 'token '+cfg.token,
      'Accept': 'application/vnd.github+json'
    };
  }
  // Generic single-file fetch: resolves {notFound:true} | {data:<github contents api response>}
  function loadGithubFile(cfg, path){
    return fetch(ghGetUrl(cfg, path), { headers: ghHeaders(cfg) }).then(function(res){
      if(res.status === 404) return { notFound:true };
      if(!res.ok) throw new Error('GitHub error '+res.status);
      return res.json().then(function(data){ return { data: data }; });
    });
  }
  // Generic single-file save with one 409-conflict retry. Resolves the new sha.
  function saveGithubFile(cfg, path, sha, contentObj, message){
    var body = {
      message: message,
      content: b64EncodeUnicode(JSON.stringify(contentObj, null, 2)),
      branch: cfg.branch || 'main'
    };
    if(sha) body.sha = sha;
    function put(b){
      return fetch(ghContentsUrl(cfg, path), {
        method: 'PUT',
        headers: Object.assign({'Content-Type':'application/json'}, ghHeaders(cfg)),
        body: JSON.stringify(b)
      });
    }
    return put(body).then(function(res){
      if(res.status === 409){
        return loadGithubFile(cfg, path).then(function(r){
          var newSha = r.data ? r.data.sha : null;
          body.sha = newSha;
          return put(body);
        });
      }
      return res;
    }).then(function(res){
      if(!res.ok) throw new Error('GitHub save error '+res.status);
      return res.json();
    }).then(function(data){
      return data && data.content ? data.content.sha : null;
    });
  }

  /* ---- Tasks file ---- */
  function loadFromGitHub(){
    var cfg = getConfig();
    if(!cfg || !cfg.owner || !cfg.repo || !cfg.token){
      loadLocal();
      updateSyncStatus('local');
      showSetupBanner(true);
      render();
      return;
    }
    updateSyncStatus('busy');
    loadGithubFile(cfg, cfg.path)
      .then(function(r){
        if(r.notFound){
          state.ghSha = null;
          state.tasks = loadLocalTasksOnly();
          updateSyncStatus('ok');
          showSetupBanner(false);
          render();
          saveToGitHub();
          return;
        }
        state.ghSha = r.data.sha;
        var parsed;
        try{ parsed = JSON.parse(b64DecodeUnicode(r.data.content)); }catch(e){ parsed = {tasks:[]}; }
        state.tasks = parsed.tasks || [];
        cacheLocal();
        updateSyncStatus('ok');
        showSetupBanner(false);
        render();
      })
      .catch(function(err){
        console.error(err);
        loadLocal();
        updateSyncStatus('err');
        render();
      });
  }

  var saveToGitHub = debounce(function(){
    var cfg = getConfig();
    if(!cfg || !cfg.owner || !cfg.repo || !cfg.token){
      cacheLocal();
      updateSyncStatus('local');
      return;
    }
    updateSyncStatus('busy');
    saveGithubFile(cfg, cfg.path, state.ghSha, {version:1, tasks: state.tasks}, 'Update tasks.json via Task Manager app')
      .then(function(sha){
        state.ghSha = sha;
        cacheLocal();
        updateSyncStatus('ok');
      }).catch(function(err){
        console.error(err);
        cacheLocal();
        updateSyncStatus('err');
      });
  }, 1200);

  function loadLocalTasksOnly(){
    try{
      var raw = JSON.parse(localStorage.getItem(LS_TASKS) || 'null');
      return (raw && raw.tasks) || [];
    }catch(e){ return []; }
  }
  function loadLocal(){
    state.tasks = loadLocalTasksOnly();
  }
  function cacheLocal(){
    localStorage.setItem(LS_TASKS, JSON.stringify({tasks: state.tasks}));
  }
  function persist(){
    saveToGitHub();
  }

  /* ---- Family calendar file ---- */
  function loadCalendarFromGitHub(){
    var cfg = getConfig();
    if(!cfg || !cfg.owner || !cfg.repo || !cfg.token){
      loadCalendarLocal();
      resolveCurrentFamilyMember();
      if(state.view === 'calendar') render();
      return;
    }
    var path = cfg.calendarPath || 'family-calendar.json';
    loadGithubFile(cfg, path)
      .then(function(r){
        if(r.notFound){
          state.calSha = null;
          var localCal = loadCalendarLocalOnly();
          state.family = localCal.family; state.events = localCal.events;
          resolveCurrentFamilyMember();
          if(state.view === 'calendar') render();
          saveCalendarToGitHub();
          return;
        }
        state.calSha = r.data.sha;
        var parsed;
        try{ parsed = JSON.parse(b64DecodeUnicode(r.data.content)); }catch(e){ parsed = {family:[], events:[]}; }
        state.family = parsed.family || [];
        state.events = parsed.events || [];
        cacheCalendarLocal();
        resolveCurrentFamilyMember();
        if(state.view === 'calendar') render();
      })
      .catch(function(err){
        console.error(err);
        loadCalendarLocal();
        resolveCurrentFamilyMember();
        if(state.view === 'calendar') render();
      });
  }

  var saveCalendarToGitHub = debounce(function(){
    var cfg = getConfig();
    if(!cfg || !cfg.owner || !cfg.repo || !cfg.token){
      cacheCalendarLocal();
      return;
    }
    var path = cfg.calendarPath || 'family-calendar.json';
    updateSyncStatus('busy');
    saveGithubFile(cfg, path, state.calSha, {version:1, family: state.family, events: state.events}, 'Update family-calendar.json via Task Manager app')
      .then(function(sha){
        state.calSha = sha;
        cacheCalendarLocal();
        updateSyncStatus('ok');
      }).catch(function(err){
        console.error(err);
        cacheCalendarLocal();
        updateSyncStatus('err');
      });
  }, 1200);

  function loadCalendarLocalOnly(){
    try{
      var raw = JSON.parse(localStorage.getItem(LS_CALENDAR) || 'null');
      return { family: (raw && raw.family) || [], events: (raw && raw.events) || [] };
    }catch(e){ return { family: [], events: [] }; }
  }
  function loadCalendarLocal(){
    var c = loadCalendarLocalOnly();
    state.family = c.family; state.events = c.events;
  }
  function cacheCalendarLocal(){
    localStorage.setItem(LS_CALENDAR, JSON.stringify({family: state.family, events: state.events}));
  }
  function persistCalendar(){
    saveCalendarToGitHub();
  }

  function updateSyncStatus(s){
    state.syncStatus = s;
    var el = document.getElementById('sync-status');
    if(!el) return;
    el.className = 'sync-status ' + (s==='ok'?'ok':s==='err'?'err':s==='busy'?'busy':'');
    var label = {idle:'Idle', busy:'Syncing…', ok:'Synced with GitHub', err:'Sync error — click to retry', local:'Local only — click to connect GitHub'}[s] || s;
    el.innerHTML = '<span class="dot"></span>'+label;
  }

  function showSetupBanner(show){
    var b = document.getElementById('setup-banner');
    if(!getConfig() && show){ b.classList.remove('hidden'); }
    else { b.classList.add('hidden'); }
  }

  /* ================= RENDER: HEADER ================= */
  function renderStats(){
    var counts = {doFirst:0,schedule:0,delegate:0,eliminate:0};
    var doneToday = 0;
    state.tasks.forEach(function(t){
      if(!t.completed) counts[quadrantOf(t)]++;
      if(t.completed && t.completedAt && t.completedAt.slice(0,10) === todayStr()) doneToday++;
    });
    var html = QUADRANT_ORDER.map(function(k){
      var q = QUADRANTS[k];
      return '<span class="stat-pill"><span class="stat-dot" style="background:'+q.accent+'"></span>'+counts[k]+' '+q.title+'</span>';
    }).join('');
    if(doneToday > 0){
      html += '<span class="stat-pill done-today">✓ '+doneToday+' done today</span>';
    }
    html += '<span class="sync-status" id="sync-status"></span>';
    document.getElementById('stats-row').innerHTML = html;
    document.getElementById('sync-status').addEventListener('click', function(){
      var cfg = getConfig();
      if(!cfg){ openSettingsModal(); } else { loadFromGitHub(); loadCalendarFromGitHub(); }
    });
    updateSyncStatus(state.syncStatus);
  }

  /* ================= FILTERING ================= */
  function personMatch(t){
    if(state.person === 'all') return true;
    if(state.person === 'me') return t.assignee === 'me' || t.assignee === 'shared';
    if(state.person === 'monisha') return t.assignee === 'monisha' || t.assignee === 'shared';
    if(state.person === 'shared') return t.assignee === 'shared';
    return true;
  }
  function searchMatch(t){
    if(!state.search) return true;
    var q = state.search.toLowerCase();
    if(t.title && t.title.toLowerCase().indexOf(q) !== -1) return true;
    if(t.tags && t.tags.some(function(tag){ return tag.toLowerCase().indexOf(q) !== -1; })) return true;
    return false;
  }
  function visibleTasks(){
    return state.tasks.filter(function(t){ return !t.completed && personMatch(t) && searchMatch(t); });
  }

  /* ================= RENDER: MATRIX / LIST / ARCHIVE ================= */
  function avatarHtml(assignee){
    if(assignee === 'shared'){
      return '<span class="tc-avatars"><span class="avatar you">S</span><span class="avatar monisha">M</span></span>';
    }
    if(assignee === 'monisha'){
      return '<span class="tc-avatars"><span class="avatar monisha" style="margin-left:0">M</span></span>';
    }
    return '<span class="tc-avatars"><span class="avatar you">S</span></span>';
  }
  function metaPillsHtml(t){
    var pills = '';
    if(t.due){
      var overdue = t.due < todayStr();
      var isToday = t.due === todayStr();
      var cls = overdue ? 'due-overdue' : (isToday ? 'due-today' : '');
      pills += '<span class="meta-pill '+cls+'">'+(overdue?'Overdue ':'')+fmtDate(t.due)+'</span>';
    }
    var days = agingDays(t);
    if(days >= 3){
      var isDoFirst = quadrantOf(t) === 'doFirst';
      pills += '<span class="meta-pill aging'+(isDoFirst?' alert':'')+'">⏳ '+days+'d here</span>';
    }
    if(t.subtasks && t.subtasks.length){
      var done = t.subtasks.filter(function(s){return s.done;}).length;
      pills += '<span class="meta-pill">☑ '+done+'/'+t.subtasks.length+'</span>';
    }
    (t.tags||[]).forEach(function(tag){
      pills += '<span class="meta-pill tag">'+escapeHtml(tag)+'</span>';
    });
    return pills;
  }
  function taskCardHtml(t){
    return '<div class="task-card" draggable="true" data-id="'+t.id+'">'
      + '<div class="tc-top">'
      + '<span class="tc-check'+(t.completed?' checked':'')+'" data-action="toggle" data-id="'+t.id+'">'+(t.completed?'✓':'')+'</span>'
      + '<span class="tc-title'+(t.completed?' done':'')+'">'+escapeHtml(t.title)+'</span>'
      + avatarHtml(t.assignee)
      + '</div>'
      + '<div class="tc-meta">'+metaPillsHtml(t)+'</div>'
      + '</div>';
  }

  function renderMatrix(){
    var tasks = visibleTasks();
    var byQ = {doFirst:[],schedule:[],delegate:[],eliminate:[]};
    tasks.forEach(function(t){ byQ[quadrantOf(t)].push(t); });

    function panel(qkey){
      var q = QUADRANTS[qkey];
      var list = byQ[qkey];
      var body = list.length
        ? list.map(taskCardHtml).join('')
        : '<div class="q-empty">Nothing here — drag a task over, or add one above.</div>';
      return '<div class="quadrant '+q.cls+'">'
        + '<div class="q-header">'
        + '<span class="dot" style="background:'+q.accent+'"></span>'
        + '<div class="q-header-text"><div class="q-title">'+q.title+'</div><div class="q-subtitle">'+q.subtitle+'</div></div>'
        + '<span class="q-count">'+list.length+'</span>'
        + '</div>'
        + '<div class="q-body" data-quadrant="'+qkey+'">'+body+'</div>'
        + '</div>';
    }

    var html = '<div class="matrix-outer"><div class="matrix-cross">'
      + '<span></span>'
      + '<span class="axis-top urgent">Urgent</span>'
      + '<span class="axis-top not-urgent">Not Urgent</span>'
      + '<span class="axis-left important">Important</span>'
      + panel('doFirst')
      + panel('schedule')
      + '<span class="axis-left not-important">Not Important</span>'
      + panel('delegate')
      + panel('eliminate')
      + '</div></div>';
    document.getElementById('view-root').innerHTML = html;
    attachDragAndDrop();
    attachCardHandlers();
  }

  function renderList(){
    var tasks = visibleTasks();
    var byQ = {doFirst:[],schedule:[],delegate:[],eliminate:[]};
    tasks.forEach(function(t){ byQ[quadrantOf(t)].push(t); });

    function group(qkey){
      var q = QUADRANTS[qkey];
      var list = byQ[qkey];
      var rows = list.length ? list.map(function(t){
        return '<div class="list-row" data-id="'+t.id+'">'
          + '<span class="tc-check'+(t.completed?' checked':'')+'" data-action="toggle" data-id="'+t.id+'">'+(t.completed?'✓':'')+'</span>'
          + '<span class="tc-title'+(t.completed?' done':'')+'">'+escapeHtml(t.title)+'</span>'
          + (t.due ? '<span class="meta-pill'+(t.due<todayStr()?' due-overdue':(t.due===todayStr()?' due-today':''))+'">'+fmtDate(t.due)+'</span>' : '')
          + avatarHtml(t.assignee)
          + '</div>';
      }).join('') : '<div class="list-empty">Nothing here.</div>';
      return '<div class="list-group"><div class="q-header" style="background:'+ {doFirst:'var(--do-first-tint)',schedule:'var(--schedule-tint)',delegate:'var(--delegate-tint)',eliminate:'var(--eliminate-tint)'}[qkey] +'">'
        + '<span class="dot" style="background:'+q.accent+'"></span>'
        + '<div class="q-header-text"><div class="q-title">'+q.title+'</div></div>'
        + '<span class="q-count">'+list.length+'</span></div>'+rows+'</div>';
    }
    document.getElementById('view-root').innerHTML = '<div class="list-view">'+QUADRANT_ORDER.map(group).join('')+'</div>';
    attachCardHandlers();
  }

  function renderArchive(){
    var done = state.tasks.filter(function(t){ return t.completed; })
      .sort(function(a,b){ return (b.completedAt||'').localeCompare(a.completedAt||''); });
    var html = done.length ? done.map(function(t){
      return '<div class="archive-row" data-id="'+t.id+'">'
        + avatarHtml(t.assignee)
        + '<span class="tc-title done" style="flex:1">'+escapeHtml(t.title)+'</span>'
        + '<span class="archive-date">Completed '+(t.completedAt?fmtDate(t.completedAt.slice(0,10)):'')+'</span>'
        + '<button class="btn-sm" data-action="restore" data-id="'+t.id+'">Restore</button>'
        + '<button class="btn-sm danger" data-action="delete" data-id="'+t.id+'">Delete</button>'
        + '</div>';
    }).join('') : '<div class="list-empty">No completed tasks yet.</div>';
    document.getElementById('view-root').innerHTML = '<div class="archive-view">'+html+'</div>';

    document.getElementById('view-root').querySelectorAll('[data-action="restore"]').forEach(function(btn){
      btn.addEventListener('click', function(){ restoreTask(btn.dataset.id); });
    });
    document.getElementById('view-root').querySelectorAll('[data-action="delete"]').forEach(function(btn){
      btn.addEventListener('click', function(){ deleteTask(btn.dataset.id, true); });
    });
    document.getElementById('view-root').querySelectorAll('.archive-row').forEach(function(row){
      row.addEventListener('click', function(e){
        if(e.target.closest('button')) return;
        openTaskModal(row.dataset.id);
      });
    });
  }

  /* ================= CALENDAR: RENDER ================= */
  function familyMember(id){ return state.family.find(function(m){ return m.id===id; }); }
  function categoryOf(occ){ return EVENT_CATEGORIES[occ.category] || EVENT_CATEGORIES.other; }

  function occFromOccurrenceId(occId){
    var sep = occId.indexOf('::');
    if(sep === -1){
      var ev = findEventById(occId);
      if(!ev) return null;
      return Object.assign({}, ev, { occurrenceId: ev.id, occurrenceDate: ev.date, isOverride: !!ev.recurrenceId, isVirtual:false });
    }
    var masterId = occId.slice(0,sep), date = occId.slice(sep+2);
    var master = findEventById(masterId);
    if(!master) return null;
    var span = eventSpanDays(master);
    return Object.assign({}, master, {
      occurrenceId: occId, occurrenceDate: date, date: date,
      endDate: span ? dateAdd(date, span) : master.endDate,
      isOverride:false, isVirtual:true, masterId: masterId
    });
  }

  function eventMatchesFilter(occ){
    if(state.calFilter !== 'all'){
      var att = occ.attendees || ['all'];
      if(att.indexOf('all') === -1 && att.indexOf(state.calFilter) === -1) return false;
    }
    if(state.calSearch){
      var q = state.calSearch.toLowerCase();
      var hay = ((occ.title||'')+' '+(occ.location||'')).toLowerCase();
      if(hay.indexOf(q) === -1) return false;
    }
    return true;
  }

  function attendeeAvatarsHtml(occ){
    var att = occ.attendees || ['all'];
    var members = (att.indexOf('all') !== -1) ? state.family.slice(0,4) : att.map(familyMember).filter(Boolean);
    return members.map(function(m){
      return '<span class="avatar" style="background:'+m.color+';margin-left:-6px;" title="'+escapeHtml(m.name)+'">'+escapeHtml((m.name||'?')[0])+'</span>';
    }).join('');
  }

  function eventChipHtml(occ){
    var cat = categoryOf(occ);
    return '<div class="event-chip" style="background:'+cat.color+'" data-occ="'+occ.occurrenceId+'" title="'+escapeHtml(occ.title)+'">'
      + '<span class="ec-icon">'+cat.icon+'</span><span class="ec-title">'+escapeHtml(occ.title)+'</span></div>';
  }

  function renderCountdownStrip(){
    var today = todayStr();
    var occ = expandOccurrences(today, dateAdd(today,60)).filter(function(o){
      if(state.calFilter !== 'all'){
        var att = o.attendees || ['all'];
        if(att.indexOf('all') === -1 && att.indexOf(state.calFilter) === -1) return false;
      }
      return true;
    }).slice(0,6);
    if(!occ.length) return '';
    var cards = occ.map(function(o){
      var days = dateDiffDays(today, o.occurrenceDate);
      var when = days===0 ? 'Today' : days===1 ? 'Tomorrow' : 'in '+days+' days';
      var cat = categoryOf(o);
      return '<div class="countdown-card" data-occ="'+o.occurrenceId+'">'
        + '<div class="cc-icon">'+cat.icon+'</div>'
        + '<div class="cc-title">'+escapeHtml(o.title)+'</div>'
        + '<div class="cc-when'+(days===0?' today':'')+'">'+when+' · '+fmtDate(o.occurrenceDate)+'</div>'
        + '</div>';
    }).join('');
    return '<div class="countdown-strip">'+cards+'</div>';
  }

  function renderMonthGrid(rangeStart, rangeEnd, occurrences){
    var today = todayStr();
    var byDate = {};
    occurrences.forEach(function(o){ (byDate[o.occurrenceDate] = byDate[o.occurrenceDate]||[]).push(o); });
    var monthNum = state.calAnchor.slice(0,7);
    var weekdayHead = WEEKDAY_LABELS.map(function(l){ return '<div class="month-weekday">'+l+'</div>'; }).join('');
    var cells = '';
    var d = rangeStart;
    for(var i=0;i<42;i++){
      var inMonth = d.slice(0,7) === monthNum;
      var isToday = d === today;
      var dayList = byDate[d] || [];
      var list = dayList.slice(0,3);
      var extra = dayList.length - list.length;
      cells += '<div class="month-cell'+(inMonth?'':' outside')+(isToday?' today':'')+'" data-date="'+d+'">'
        + '<div class="mc-num">'+parseInt(d.slice(8,10),10)+'</div>'
        + list.map(eventChipHtml).join('')
        + (extra>0 ? '<div class="month-more" data-jump="'+d+'">+'+extra+' more</div>' : '')
        + '</div>';
      d = dateAdd(d,1);
    }
    return '<div class="month-grid">'+weekdayHead+cells+'</div>';
  }

  function renderWeekLanes(rangeStart, rangeEnd, occurrences){
    var today = todayStr();
    var days = [];
    for(var i=0;i<7;i++) days.push(dateAdd(rangeStart,i));

    var byPersonDate = {};
    occurrences.forEach(function(o){
      var att = o.attendees || ['all'];
      if(att.indexOf('all') !== -1){
        byPersonDate.everyone = byPersonDate.everyone || {};
        (byPersonDate.everyone[o.occurrenceDate] = byPersonDate.everyone[o.occurrenceDate]||[]).push(o);
      } else {
        att.forEach(function(pid){
          byPersonDate[pid] = byPersonDate[pid] || {};
          (byPersonDate[pid][o.occurrenceDate] = byPersonDate[pid][o.occurrenceDate]||[]).push(o);
        });
      }
    });

    var head = '<div></div>' + days.map(function(d){
      var dow = new Date(d+'T00:00:00').toLocaleDateString(undefined,{weekday:'short'});
      return '<div class="week-head'+(d===today?' today':'')+'">'+dow+' '+parseInt(d.slice(8,10),10)+'</div>';
    }).join('');

    var rows = '<div class="week-lane-label"><span class="adot" style="background:var(--primary-btn)"></span>Everyone</div>'
      + days.map(function(d){
          var list = (byPersonDate.everyone && byPersonDate.everyone[d]) || [];
          return '<div class="week-cell'+(d===today?' today':'')+'" data-date="'+d+'">'+list.map(eventChipHtml).join('')+'</div>';
        }).join('');

    state.family.forEach(function(m){
      if(state.calFilter !== 'all' && state.calFilter !== m.id) return;
      rows += '<div class="week-lane-label"><span class="adot" style="background:'+m.color+'"></span>'+escapeHtml(m.name)+'</div>'
        + days.map(function(d){
            var list = (byPersonDate[m.id] && byPersonDate[m.id][d]) || [];
            return '<div class="week-cell'+(d===today?' today':'')+'" data-date="'+d+'">'+list.map(eventChipHtml).join('')+'</div>';
          }).join('');
    });

    return '<div class="week-wrap"><div class="week-grid">'+head+rows+'</div></div>';
  }

  function renderAgendaRail(rangeStart, rangeEnd, occurrences){
    var today = todayStr();
    var byDate = {};
    occurrences.forEach(function(o){ (byDate[o.occurrenceDate] = byDate[o.occurrenceDate]||[]).push(o); });
    var dates = Object.keys(byDate).sort();
    if(!dates.length){
      return '<div class="agenda-rail"><div class="agenda-empty">Nothing coming up in this window.</div></div>';
    }
    var days = dates.map(function(d){
      var isToday = d === today;
      var isTomorrow = d === dateAdd(today,1);
      var list = byDate[d].slice().sort(function(a,b){ return (a.time||'').localeCompare(b.time||''); });
      var cards = list.map(function(o){
        var cat = categoryOf(o);
        var timeLabel = o.allDay ? 'All day' : (o.time||'');
        var loc = o.location ? ' · '+escapeHtml(o.location) : '';
        return '<div class="agenda-card" style="border-left-color:'+cat.color+'" data-occ="'+o.occurrenceId+'">'
          + '<span class="ac-icon">'+cat.icon+'</span>'
          + '<div class="ac-body"><div class="ac-title">'+escapeHtml(o.title)+'</div><div class="ac-meta">'+timeLabel+loc+'</div></div>'
          + '<span class="ac-avatars">'+attendeeAvatarsHtml(o)+'</span>'
          + '</div>';
      }).join('');
      return '<div class="agenda-day">'
        + '<div class="agenda-day-label">'+fmtLong(d)+(isToday?'<span class="today-badge">Today</span>':(isTomorrow?'<span class="today-badge" style="background:var(--ink-muted)">Tomorrow</span>':''))+'</div>'
        + '<div class="agenda-cards">'+cards+'</div>'
        + '</div>';
    }).join('');
    return '<div class="agenda-rail">'+days+'</div>';
  }

  function renderCalToolbar(){
    document.querySelectorAll('#cal-subview-tabs button').forEach(function(b){
      b.classList.toggle('active', b.dataset.subview === state.calSubView);
    });
    var famHtml = '<button data-fam="all" class="'+(state.calFilter==='all'?'active':'')+'">All</button>'
      + state.family.map(function(m){
          return '<button data-fam="'+m.id+'" class="'+(state.calFilter===m.id?'active':'')+'">'+escapeHtml(m.name)+'</button>';
        }).join('');
    var famTabs = document.getElementById('cal-family-tabs');
    famTabs.innerHTML = famHtml;
    famTabs.querySelectorAll('button').forEach(function(b){
      b.addEventListener('click', function(){ state.calFilter = b.dataset.fam; render(); });
    });
  }

  function updateCalPeriodLabel(rangeStart, rangeEnd){
    var el = document.getElementById('cal-period-label');
    if(!el) return;
    if(state.calSubView === 'month') el.textContent = fmtMonthYear(state.calAnchor);
    else if(state.calSubView === 'week') el.textContent = fmtDate(rangeStart)+' – '+fmtDate(rangeEnd);
    else el.textContent = 'Next 3 weeks';
  }

  function calNavStep(dir){
    if(state.calSubView === 'month') state.calAnchor = addMonths(state.calAnchor, dir);
    else state.calAnchor = dateAdd(state.calAnchor, dir*7);
    render();
  }

  function renderCalendar(){
    renderCalToolbar();

    var today = todayStr();
    var rangeStart, rangeEnd;
    if(state.calSubView === 'month'){
      rangeStart = startOfWeek(startOfMonth(state.calAnchor));
      rangeEnd = dateAdd(rangeStart, 41);
    } else if(state.calSubView === 'week'){
      rangeStart = startOfWeek(state.calAnchor);
      rangeEnd = dateAdd(rangeStart, 6);
    } else {
      rangeStart = state.calAnchor;
      rangeEnd = dateAdd(rangeStart, 20);
    }

    var occurrences = expandOccurrences(rangeStart, rangeEnd).filter(eventMatchesFilter);

    var html = '<div class="cal-wrap">' + renderCountdownStrip();
    if(state.calSubView === 'month') html += renderMonthGrid(rangeStart, rangeEnd, occurrences);
    else if(state.calSubView === 'week') html += renderWeekLanes(rangeStart, rangeEnd, occurrences);
    else html += renderAgendaRail(rangeStart, rangeEnd, occurrences);
    html += '</div>';

    document.getElementById('view-root').innerHTML = html;

    document.getElementById('view-root').querySelectorAll('[data-occ]').forEach(function(el){
      el.addEventListener('click', function(e){
        e.stopPropagation();
        var occ = occFromOccurrenceId(el.dataset.occ);
        if(occ) openEventModal(occ);
      });
    });
    document.getElementById('view-root').querySelectorAll('.month-more').forEach(function(el){
      el.addEventListener('click', function(e){
        e.stopPropagation();
        state.calAnchor = el.dataset.jump;
        state.calSubView = 'agenda';
        render();
      });
    });
    document.getElementById('view-root').querySelectorAll('.month-cell,.week-cell').forEach(function(cell){
      cell.addEventListener('click', function(e){
        if(e.target.closest('[data-occ]') || e.target.closest('.month-more')) return;
        openAddEventModal(cell.dataset.date);
      });
    });

    updateCalPeriodLabel(rangeStart, rangeEnd);
  }

  function toggleToolbars(){
    var isCal = state.view === 'calendar';
    document.getElementById('task-toolbar').classList.toggle('hidden', isCal);
    document.getElementById('calendar-toolbar').classList.toggle('hidden', !isCal);
    document.getElementById('stats-row').classList.toggle('hidden', isCal);
    document.body.classList.toggle('kid-mode', isCal && isKidMode());
  }

  function render(){
    toggleToolbars();
    if(state.view === 'calendar'){
      renderCalendar();
      return;
    }
    renderStats();
    if(state.view === 'matrix') renderMatrix();
    else if(state.view === 'list') renderList();
    else renderArchive();
  }

  /* ================= CARD INTERACTIONS ================= */
  function attachCardHandlers(){
    var root = document.getElementById('view-root');
    root.querySelectorAll('[data-action="toggle"]').forEach(function(el){
      el.addEventListener('click', function(e){
        e.stopPropagation();
        toggleComplete(el.dataset.id);
      });
    });
    root.querySelectorAll('.task-card, .list-row').forEach(function(el){
      el.addEventListener('click', function(e){
        if(e.target.closest('[data-action]')) return;
        openTaskModal(el.dataset.id);
      });
    });
  }

  function attachDragAndDrop(){
    var root = document.getElementById('view-root');
    var cards = root.querySelectorAll('.task-card');
    cards.forEach(function(card){
      card.addEventListener('dragstart', function(e){
        card.classList.add('dragging');
        e.dataTransfer.setData('text/plain', card.dataset.id);
        e.dataTransfer.effectAllowed = 'move';
      });
      card.addEventListener('dragend', function(){ card.classList.remove('dragging'); });
    });
    var zones = root.querySelectorAll('.q-body');
    zones.forEach(function(zone){
      zone.addEventListener('dragover', function(e){
        e.preventDefault();
        zone.classList.add('drag-over');
      });
      zone.addEventListener('dragleave', function(){ zone.classList.remove('drag-over'); });
      zone.addEventListener('drop', function(e){
        e.preventDefault();
        zone.classList.remove('drag-over');
        var id = e.dataTransfer.getData('text/plain');
        moveToQuadrant(id, zone.dataset.quadrant);
      });
    });
  }

  /* ================= TASK MUTATIONS ================= */
  function findTask(id){ return state.tasks.find(function(t){ return t.id === id; }); }

  function logActivity(task, text){
    if(!task.activity) task.activity = [];
    task.activity.unshift({ id: uid(), text: text, ts: nowISO() });
  }

  function toggleComplete(id){
    var t = findTask(id);
    if(!t) return;
    t.completed = !t.completed;
    t.completedAt = t.completed ? nowISO() : null;
    if(t.assignee === 'shared') logActivity(t, t.completed ? 'Marked complete' : 'Marked incomplete');
    persist(); render();
  }

  function moveToQuadrant(id, qkey){
    var t = findTask(id);
    if(!t) return;
    var q = QUADRANTS[qkey];
    var changed = (t.importance !== q.important) || (t.urgency !== q.urgent);
    t.importance = q.important;
    t.urgency = q.urgent;
    if(changed){
      t.quadrantEnteredAt = nowISO();
      if(t.assignee === 'shared') logActivity(t, 'Moved to '+q.title);
    }
    persist(); render();
  }

  function restoreTask(id){
    var t = findTask(id);
    if(!t) return;
    t.completed = false;
    t.completedAt = null;
    persist(); render();
  }

  function deleteTask(id, skipUndo){
    var idx = state.tasks.findIndex(function(t){ return t.id === id; });
    if(idx === -1) return;
    var task = state.tasks[idx];
    state.tasks.splice(idx,1);
    persist(); render();
    state.deletedBuffer = { task: task, index: idx };
    showToast('Deleted "'+escapeHtml(task.title)+'"', true, 5000);
  }

  function undoDelete(){
    if(!state.deletedBuffer) return;
    var buf = state.deletedBuffer;
    var idx = Math.min(buf.index, state.tasks.length);
    state.tasks.splice(idx, 0, buf.task);
    state.deletedBuffer = null;
    persist(); render();

  function guessQuadrantFromText(text){
    var lower = text.toLowerCase();
    var urgent = URGENT_WORDS.some(function(w){ return lower.indexOf(w) !== -1; });
    var notImportant = NOT_IMPORTANT_WORDS.some(function(w){ return lower.indexOf(w) !== -1; });
    return { importance: !notImportant, urgency: urgent };
  }

    var assignee = defaultAssignee();

      importance: guess.importance, urgency: guess.urgency,
      assignee: assignee, due: null, tags: [],
      subtasks: [], completed: false, completedAt: null,
      quadrantEnteredAt: nowISO(), activity: []
    };
    state.tasks.push(task);

    var qkey = quadrantOf(task);

  /* ================= CALENDAR: DATE HELPERS ================= */
  function dateAdd(dateStr, days){
    var d = new Date(dateStr+'T00:00:00');
    d.setDate(d.getDate()+days);
    return toLocalDateStr(d);
  }
  function dateDiffDays(a,b){
    return Math.round((new Date(b+'T00:00:00') - new Date(a+'T00:00:00')) / 86400000);
  }
  function addMonths(dateStr, n){
    var d = new Date(dateStr+'T00:00:00');
    var day = d.getDate();
    d.setDate(1);
    d.setMonth(d.getMonth()+n);
    var lastDay = new Date(d.getFullYear(), d.getMonth()+1, 0).getDate();
    d.setDate(Math.min(day, lastDay));
    return toLocalDateStr(d);
  }
  function addYears(dateStr, n){
    var d = new Date(dateStr+'T00:00:00');
    d.setFullYear(d.getFullYear()+n);
    return toLocalDateStr(d);
  }
  function startOfWeek(dateStr){ // Sunday-start week
    var d = new Date(dateStr+'T00:00:00');
    d.setDate(d.getDate()-d.getDay());
    return toLocalDateStr(d);
  }
  function startOfMonth(dateStr){
    return dateStr.slice(0,7)+'-01';
  }
  function fmtLong(dateStr){
    var d = new Date(dateStr+'T00:00:00');
    return d.toLocaleDateString(undefined, {weekday:'long', month:'long', day:'numeric'});
  }
  function fmtMonthYear(dateStr){
    var d = new Date(dateStr+'T00:00:00');
    return d.toLocaleDateString(undefined, {month:'long', year:'numeric'});
  }
  var WEEKDAY_LABELS = ['S','M','T','W','T','F','S'];

  /* ================= CALENDAR: RECURRENCE ENGINE ================= */
  var MAX_RECUR_ITERATIONS = 400;

  function eventSpanDays(ev){
    if(!ev.endDate) return 0;
    return Math.max(0, dateDiffDays(ev.date, ev.endDate));
  }
  function occurrenceInRange(startDate, spanDays, rangeStart, rangeEnd){
    var endDate = spanDays ? dateAdd(startDate, spanDays) : startDate;
    return !(endDate < rangeStart || startDate > rangeEnd);
  }
  function findEventById(id){
    return state.events.find(function(e){ return e.id === id; });
  }
  // Expands all events into concrete occurrences intersecting [rangeStart, rangeEnd] (inclusive, 'YYYY-MM-DD').
  function expandOccurrences(rangeStart, rangeEnd){
    var out = [];
    var safetyLimit = dateAdd(rangeEnd, 3);

    state.events.forEach(function(ev){
      var span = eventSpanDays(ev);

      if(ev.recurrenceId || !ev.recurrence){
        // one-off event, or a standalone override tied to a series
        if(occurrenceInRange(ev.date, span, rangeStart, rangeEnd)){
          out.push(Object.assign({}, ev, { occurrenceId: ev.id, occurrenceDate: ev.date, isOverride: !!ev.recurrenceId, isVirtual:false }));
        }
        return;
      }

      // recurring master
      var rule = ev.recurrence;
      var cursor = ev.date;
      var weekdayMode = rule.freq === 'weekly' && rule.byWeekday && rule.byWeekday.length;
      var iterations = 0, matched = 0;

      while(iterations < MAX_RECUR_ITERATIONS){
        iterations++;
        if(rule.until && cursor > rule.until) break;
        if(cursor > safetyLimit) break;

        var include = true;
        if(weekdayMode){
          var dow = new Date(cursor+'T00:00:00').getDay();
          include = rule.byWeekday.indexOf(dow) !== -1;
        }
        if(include){
          matched++;
          if(rule.count && matched > rule.count) break;
          if((ev.exceptionDates||[]).indexOf(cursor) === -1 && occurrenceInRange(cursor, span, rangeStart, rangeEnd)){
            out.push(Object.assign({}, ev, {
              occurrenceId: ev.id+'::'+cursor, occurrenceDate: cursor, date: cursor,
              endDate: span ? dateAdd(cursor, span) : ev.endDate,
              isOverride:false, isVirtual:true, masterId: ev.id
            }));
          }
        }

        if(weekdayMode) cursor = dateAdd(cursor, 1);
        else if(rule.freq === 'daily') cursor = dateAdd(cursor, rule.interval||1);
        else if(rule.freq === 'weekly') cursor = dateAdd(cursor, 7*(rule.interval||1));
        else if(rule.freq === 'monthly') cursor = addMonths(cursor, rule.interval||1);
        else if(rule.freq === 'yearly') cursor = addYears(cursor, rule.interval||1);
        else break;
      }
    });

    out.sort(function(a,b){ return (a.occurrenceDate+(a.time||'')).localeCompare(b.occurrenceDate+(b.time||'')); });
    return out;
  }

  // scope: 'this' | 'following' | 'all'. occ must be a virtual occurrence (occ.isVirtual === true).
  function applyEditScope(occ, scope, fields){
    var master = findEventById(occ.masterId);
    if(!master) return;
    if(scope === 'all'){
      var f = Object.assign({}, fields);
      delete f.date; // series start date doesn't move on an "all" edit
      Object.assign(master, f);
    } else if(scope === 'this'){
      master.exceptionDates = master.exceptionDates || [];
      if(master.exceptionDates.indexOf(occ.occurrenceDate) === -1) master.exceptionDates.push(occ.occurrenceDate);
      state.events.push(Object.assign({}, master, fields, {
        id: uid(), recurrence: null, exceptionDates: [],
        recurrenceId: master.id, overrideDate: occ.occurrenceDate,
        date: fields.date || occ.occurrenceDate
      }));
    } else if(scope === 'following'){
      var cutoff = dateAdd(occ.occurrenceDate, -1);
      var oldUntil = master.recurrence.until;
      master.recurrence = Object.assign({}, master.recurrence, { until: cutoff });
      var newRule = Object.assign({}, master.recurrence, { until: oldUntil });
      if(fields.recurrence) newRule = Object.assign(newRule, fields.recurrence);
      state.events.push(Object.assign({}, master, fields, {
        id: uid(), date: occ.occurrenceDate, exceptionDates: [],
        recurrence: newRule, recurrenceId: null, overrideDate: null
      }));
    }
  }

  function deleteOccurrence(occ, scope){
    if(occ.isOverride || !occ.isVirtual){
      state.events = state.events.filter(function(e){ return e.id !== occ.occurrenceId; });
      return;
    }
    var master = findEventById(occ.masterId);
    if(!master) return;
    if(scope === 'this'){
      master.exceptionDates = master.exceptionDates || [];
      master.exceptionDates.push(occ.occurrenceDate);
    } else if(scope === 'following'){
      master.recurrence.until = dateAdd(occ.occurrenceDate, -1);
    } else if(scope === 'all'){
      state.events = state.events.filter(function(e){ return e.id !== master.id && e.recurrenceId !== master.id; });
    }
  }

  function promptScope(title, cb){
    var wrap = document.createElement('div');
    wrap.innerHTML = '<div class="scrim" id="scope-scrim"><div class="modal" style="max-width:380px;">'

      + '<button class="btn-sm" data-scope="following" style="text-align:left;padding:11px 14px;">This and following events</button>'
      + '<button class="btn-sm" data-scope="all" style="text-align:left;padding:11px 14px;">All events in the series</button>'
      + '<button class="btn-sm" data-scope="cancel" style="text-align:left;padding:11px 14px;color:var(--ink-muted);">Cancel</button>'
      + '</div></div></div>';
    document.body.appendChild(wrap);
    wrap.querySelector('#scope-scrim').addEventListener('click', function(e){
      if(e.target.id === 'scope-scrim') document.body.removeChild(wrap);
    });
    wrap.querySelectorAll('button[data-scope]').forEach(function(btn){
      btn.addEventListener('click', function(){
        document.body.removeChild(wrap);
        if(btn.dataset.scope !== 'cancel') cb(btn.dataset.scope);
      });
    });
  }
